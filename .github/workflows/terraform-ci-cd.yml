name: Terraform CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      is_new_project:
        description: 'Is this a completely new project? (true/false)'
        type: boolean
        required: true
        default: true
      cluster_name:
        description: 'ECS Cluster Name (to create or install OneAgent on)'
        type: string
        required: true
        default: 'ecs-oneagent-cluster'
      project_tag_key:
        description: 'AWS Tag key to filter clusters by'
        type: string
        required: false
        default: 'Project'
      project_tag_value:
        description: 'AWS Tag value to filter clusters by (e.g. electricity.com)'
        type: string
        required: false
        default: ''

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login into AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Check Existing Clusters by Tag
        id: check_clusters
        env:
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          TAG_KEY="${{ github.event.inputs.project_tag_key || secrets.PROJECT_TAG_KEY || 'Project' }}"
          TAG_VALUE="${{ github.event.inputs.project_tag_value || secrets.PROJECT_TAG_VALUE }}"
          
          if [ -z "${TAG_VALUE}" ]; then
            echo "[INFO] No project tag specified. Proceeding with user cluster inputs."
            echo "create_cluster=${{ github.event.inputs.is_new_project || 'true' }}" >> $GITHUB_OUTPUT
            echo "cluster_name=${{ github.event.inputs.cluster_name || 'ecs-oneagent-cluster' }}" >> $GITHUB_OUTPUT
          else
            echo "[INFO] Querying AWS Resource Groups Tagging API for tag: ${TAG_KEY}=${TAG_VALUE}"
            CLUSTERS=$(aws resourcegroupstaggingapi get-resources \
              --tag-filters "Key=${TAG_KEY},Values=${TAG_VALUE}" \
              --resource-type-filters "ecs:cluster" \
              --query "ResourceTagMappingList[*].ResourceARN" \
              --output text)
            
            if [ -z "${CLUSTERS}" ]; then
              echo "[INFO] No clusters found for project tag: ${TAG_KEY}=${TAG_VALUE}. Will create a new cluster."
              echo "create_cluster=true" >> $GITHUB_OUTPUT
              CLEAN_NAME=$(echo "${TAG_VALUE}" | tr '.' '-' | tr -cd '[:alnum:]_-')
              echo "cluster_name=${CLEAN_NAME}-cluster" >> $GITHUB_OUTPUT
            else
              echo "[INFO] Found existing cluster(s) for project tag."
              echo "create_cluster=false" >> $GITHUB_OUTPUT
              
              FIRST_ARN=$(echo $CLUSTERS | awk '{print $1}')
              CLUSTER_NAME=$(echo $FIRST_ARN | awk -F/ '{print $NF}')
              echo "cluster_name=${CLUSTER_NAME}" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Deploy Base Infrastructure (TF)
        env:
          TF_VAR_dynatrace_url: ${{ secrets.DYNATRACE_URL }}
          TF_VAR_dynatrace_paas_token: ${{ secrets.DYNATRACE_PAAS_TOKEN }}
          TF_VAR_is_new_project: ${{ steps.check_clusters.outputs.create_cluster }}
          TF_VAR_cluster_name: ${{ steps.check_clusters.outputs.cluster_name }}
          TF_VAR_project_tag_value: ${{ github.event.inputs.project_tag_value || secrets.PROJECT_TAG_VALUE }}
        run: |
          terraform init
          terraform apply -auto-approve -no-color

      - name: Install Python Dependencies
        run: pip install boto3

      - name: Collecting and Observing Clusters
        env:
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          PROJECT_TAG_KEY: ${{ github.event.inputs.project_tag_key || secrets.PROJECT_TAG_KEY || 'Project' }}
          PROJECT_TAG_VALUE: ${{ github.event.inputs.project_tag_value || secrets.PROJECT_TAG_VALUE }}
        run: |
          CLUSTER_ARG=""
          if [ -z "${PROJECT_TAG_VALUE}" ]; then
            CLUSTER_ARG="--cluster ${{ steps.check_clusters.outputs.cluster_name }}"
          fi
          python3 .github/scripts/manage_oneagent.py --observe $CLUSTER_ARG

      - name: Installing OneAgent in Missing Clusters
        env:
          ENVIRONMENT: "production"
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          PROJECT_TAG_KEY: ${{ github.event.inputs.project_tag_key || secrets.PROJECT_TAG_KEY || 'Project' }}
          PROJECT_TAG_VALUE: ${{ github.event.inputs.project_tag_value || secrets.PROJECT_TAG_VALUE }}
        run: |
          ONEAGENT_TASK_DEFINITION_ARN=$(terraform output -raw oneagent_task_definition_arn)
          export ONEAGENT_TASK_DEFINITION_ARN
          CLUSTER_ARG=""
          if [ -z "${PROJECT_TAG_VALUE}" ]; then
            CLUSTER_ARG="--cluster ${{ steps.check_clusters.outputs.cluster_name }}"
          fi
          python3 .github/scripts/manage_oneagent.py --install $CLUSTER_ARG


          