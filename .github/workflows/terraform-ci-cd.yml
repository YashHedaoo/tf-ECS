name: Terraform CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Lint, Validate, and Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Run Checkov Security Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          config_file: policies/checkov/config.yaml
          framework: terraform
          soft_fail: false

      - name: Run tfsec Security Scan
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: .
          additional_args: --config-file policies/tfsec/config.json

  deploy:
    name: Deploy to ECS
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login into AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Deploy Base Infrastructure (TF)
        env:
          TF_VAR_dynatrace_url: ${{ secrets.DYNATRACE_URL }}
          TF_VAR_dynatrace_paas_token: ${{ secrets.DYNATRACE_PAAS_TOKEN }}
        run: |
          terraform init
          terraform apply -auto-approve -no-color

      - name: Install Python Dependencies
        run: pip install boto3

      - name: Collecting and Observing Clusters
        env:
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: python3 .github/scripts/manage_oneagent.py --observe

      - name: Installing OneAgent in Missing Clusters
        env:
          ENVIRONMENT: "production"
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          ONEAGENT_TASK_DEFINITION_ARN=$(terraform output -raw oneagent_task_definition_arn)
          export ONEAGENT_TASK_DEFINITION_ARN
          python3 .github/scripts/manage_oneagent.py --install
