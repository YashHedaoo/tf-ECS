name: Terraform CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login into AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install Python Dependencies
        run: pip install boto3

      - name: Check for ECS Clusters
        id: check_ecs
        env:
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          CLUSTERS_EXIST=$(python3 -c "
          import boto3, sys
          ecs = boto3.client('ecs')
          paginator = ecs.get_paginator('list_clusters')
          arns = []
          for page in paginator.paginate():
              arns.extend(page.get('clusterArns', []))
          sys.stderr.write('============================================================\n')
          sys.stderr.write('🔍 ECS CLUSTER REGIONAL SEARCH\n')
          sys.stderr.write('============================================================\n')
          if not arns:
              sys.stderr.write('ℹ️ No active ECS clusters discovered in the region.\n')
          for arn in arns:
              sys.stderr.write(f'✨ Discovered ECS Cluster: {arn.split(\"/\")[-1]}\n')
          sys.stderr.write('============================================================\n')
          print('true' if len(arns) > 0 else 'false')
          ")
          echo "clusters_exist=${CLUSTERS_EXIST}" >> $GITHUB_OUTPUT
          if [ "${CLUSTERS_EXIST}" = "false" ]; then
            echo "============================================================"
            echo "🚫 SKIPPING STAGES: No ECS clusters present. Workflow terminating cleanly."
            echo "============================================================"
          fi

      - name: Setup Terraform
        if: steps.check_ecs.outputs.clusters_exist == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Deploy Base Infrastructure (TF)
        if: steps.check_ecs.outputs.clusters_exist == 'true'
        env:
          TF_VAR_dynatrace_url: ${{ secrets.DYNATRACE_URL }}
          TF_VAR_dynatrace_paas_token: ${{ secrets.DYNATRACE_PAAS_TOKEN }}
          TF_VAR_oneagent_installer_script_url: ${{ secrets.ONEAGENT_INSTALLER_SCRIPT_URL }}
        run: |
          terraform init
          terraform apply -auto-approve -no-color -lock=false

      - name: Collecting and Observing Clusters
        if: steps.check_ecs.outputs.clusters_exist == 'true'
        env:
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          python3 .github/scripts/manage_oneagent.py --observe

      - name: Installing OneAgent in Missing Clusters
        if: steps.check_ecs.outputs.clusters_exist == 'true'
        env:
          ENVIRONMENT: "production"
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          ONEAGENT_TASK_DEFINITION_ARN=$(terraform output -raw oneagent_task_definition_arn)
          export ONEAGENT_TASK_DEFINITION_ARN
          python3 .github/scripts/manage_oneagent.py --install
