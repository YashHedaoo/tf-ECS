name: Terraform CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      is_new_project:
        description: 'Is this a completely new project? (true/false)'
        type: boolean
        required: true
        default: true
      cluster_name:
        description: 'ECS Cluster Name (to create or install OneAgent on)'
        type: string
        required: true
        default: 'ecs-oneagent-cluster'
      project_tag_key:
        description: 'AWS Tag key to filter clusters by'
        type: string
        required: false
        default: 'Project'
      project_tag_value:
        description: 'AWS Tag value to filter clusters by (e.g. electricity.com)'
        type: string
        required: false
        default: ''

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login into AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Deploy Base Infrastructure (TF)
        env:
          TF_VAR_dynatrace_url: ${{ secrets.DYNATRACE_URL }}
          TF_VAR_dynatrace_paas_token: ${{ secrets.DYNATRACE_PAAS_TOKEN }}
          TF_VAR_oneagent_installer_script_url: ${{ secrets.ONEAGENT_INSTALLER_SCRIPT_URL }}
          TF_VAR_monitored_clusters: ${{ secrets.MONITORED_CLUSTERS }}
          TF_VAR_is_new_project: ${{ github.event.inputs.is_new_project != '' && github.event.inputs.is_new_project || 'true' }}
          TF_VAR_cluster_name: ${{ github.event.inputs.cluster_name != '' && github.event.inputs.cluster_name || 'ecs-oneagent-cluster' }}
        run: |
          terraform init
          terraform apply -auto-approve -no-color

      - name: Install Python Dependencies
        run: pip install boto3

      - name: Collecting and Observing Clusters
        env:
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          MONITORED_CLUSTERS: ${{ secrets.MONITORED_CLUSTERS }}
        run: |
          CLUSTER_ARG=""
          if [ "${{ github.event.inputs.cluster_name }}" != "" ]; then
            CLUSTER_ARG="--cluster ${{ github.event.inputs.cluster_name }}"
          fi
          python3 .github/scripts/manage_oneagent.py --observe $CLUSTER_ARG

      - name: Installing OneAgent in Missing Clusters
        env:
          ENVIRONMENT: "production"
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          MONITORED_CLUSTERS: ${{ secrets.MONITORED_CLUSTERS }}
        run: |
          ONEAGENT_TASK_DEFINITION_ARN=$(terraform output -raw oneagent_task_definition_arn)
          export ONEAGENT_TASK_DEFINITION_ARN
          CLUSTER_ARG=""
          if [ "${{ github.event.inputs.cluster_name }}" != "" ]; then
            CLUSTER_ARG="--cluster ${{ github.event.inputs.cluster_name }}"
          fi
          python3 .github/scripts/manage_oneagent.py --install $CLUSTER_ARG
